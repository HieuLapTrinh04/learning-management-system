user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 500M; # Cho phép upload file lớn lên VPS (video, tài liệu)

    # CORS Headers (Cực kỳ quan trọng khi tách Frontend sang Vercel)
    map $http_origin $cors_origin {
        default "";
        "~^https?://.*\.vercel\.app$" "$http_origin";
        "~^https?://localhost(:[0-9]+)?$" "$http_origin";
        # Thêm domain chính thức của bạn vào đây nếu có (ví dụ: "https://lumina.edu.vn" "$http_origin";)
    }

    server {
        listen 80;
        server_name _; # Bắt mọi domain/IP

        # Uploads (Serve trực tiếp từ Nginx để tối ưu tốc độ)
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            
            # CORS cho file tĩnh
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            
            try_files $uri =404;
        }

        # API & WebSockets (Reverse Proxy vào Golang Backend)
        location /api/ {
            # Xử lý Preflight (OPTIONS)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s; 
            proxy_send_timeout 3600s;
        }

        # Nếu ai đó vào thẳng IP/Domain Backend
        location / {
            default_type application/json;
            return 200 '{"status": "online", "service": "Lumina LMS API", "message": "API Server is running. Please access via Frontend Application."}';
        }
    }
}
